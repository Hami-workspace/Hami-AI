<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>HAMI AI | Advanced Intelligence</title>
    <meta name="description" content="HAMI AI - Quick, Accurate, and Updated AI Assistant">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Puter.js for free Text AI fallback -->
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body class="dark-theme">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-area">
                    <div class="sidebar-logo">H</div>
                </div>
                <button class="new-chat-btn" id="newChatBtn" title="New Chat">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                </button>
            </div>

            <div class="sidebar-content">
                <div class="history-label">Your chats</div>
                <ul class="chat-history-list" id="chatHistoryList">
                    <!-- Chat history items will be injected here -->
                </ul>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main" id="chatMain">
            <div class="chat-header">
                <div class="header-left">
                    <button class="mobile-menu-btn" id="mobileMenuBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                    <h2>HAMI AI</h2>
                </div>
                <div class="header-right">
                    <div class="user-avatar-top">A</div>
                    <button class="theme-btn sun-btn active" id="themeLight" title="Light Mode">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                    </button>
                    <button class="theme-btn moon-btn" id="themeDark" title="Dark Mode">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="chat-container" id="chatContainer">
                <!-- Welcome Message dynamically injected -->
            </div>

            <!-- Type Indicator -->
            <div class="typing-indicator hidden" id="typingIndicator">
                <div class="avatar ai-avatar">H</div>
                <div class="dots">
                    <span></span><span></span><span></span>
                </div>
            </div>

            <!-- Input and Suggested Area -->
            <div class="input-container-wrapper">
                <div class="suggested-prompts" id="suggestedPrompts">
                    <button class="prompt-btn" data-prompt="Summarize a document">
                        <span class="prompt-icon">💡</span>
                        <div class="prompt-text">
                            <span class="prompt-label">Suggested Prompt</span>
                            <span class="prompt-title">Summarize a document</span>
                        </div>
                    </button>
                    <button class="prompt-btn" data-prompt="Draft an email">
                        <span class="prompt-icon">✉️</span>
                        <div class="prompt-text">
                            <span class="prompt-label">Suggested Prompt</span>
                            <span class="prompt-title">Draft an email</span>
                        </div>
                    </button>
                    <button class="prompt-btn" data-prompt="Write a function">
                        <span class="prompt-icon">🏗️</span>
                        <div class="prompt-text">
                            <span class="prompt-label">Suggested Prompt</span>
                            <span class="prompt-title">Write a function</span>
                        </div>
                    </button>
                    <button class="prompt-btn" data-prompt="Describe an artwork">
                        <span class="prompt-icon">🎨</span>
                        <div class="prompt-text">
                            <span class="prompt-label">Suggested Prompt</span>
                            <span class="prompt-title">Describe an artwork</span>
                        </div>
                    </button>
                </div>

                <form id="chatForm" class="input-form">
                    <div class="input-left-actions">
                        <input type="file" id="fileUploadInput" style="display: none;" accept="image/*,text/plain,.pdf">
                        <button type="button" class="action-btn" id="attachFileBtn" title="Attach file">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48">
                                </path>
                            </svg>
                        </button>
                        <button type="button" class="action-btn" id="voiceInputBtn" title="Voice input">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                                <line x1="12" y1="19" x2="12" y2="23"></line>
                                <line x1="8" y1="23" x2="16" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                    <textarea id="userInput" rows="1" placeholder="Message HAMI AI..." autofocus></textarea>
                    <button type="submit" id="sendBtn" title="Send Message">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
                <div class="disclaimer">Verify important information, as HAMI AI can make mistakes. © 2024.</div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js?v=2"></script>
</body>

</html>
